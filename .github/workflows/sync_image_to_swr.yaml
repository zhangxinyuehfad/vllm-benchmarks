name: Sync Images Between Registries

on:
  workflow_dispatch:
  #pull_request:
  #  branches:
  #    - main
  #  paths:
  #    - ".github/workflows/sync-images.yml"
  #push:
  #  branches:
  #    - main
  #  paths:
  #    - ".github/workflows/sync-images.yml"

concurrency:
  group: sync-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-quay-to-swr:
    name: Sync from Quay to SWR Southwest
    runs-on: ubuntu-latest
    container:
      image: quay.io/skopeo/stable:latest
    strategy:
      matrix:
        repo: ["cann"]
    steps:
      - name: Sync quay.io/ascend-ci/vllm-ascend to SWR Southwest
        run: |
          skopeo sync --all \
            --retry-times 3 \
            --retry-delay 5s \
            --append-suffix=-nightly \
            --src docker --dest docker \
            --dest-creds ${{ secrets.HW_USERNAME }}:${{ secrets.HW_TOKEN }} \
            quay.io/ascend-ci/vllm-ascend \
            swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/
