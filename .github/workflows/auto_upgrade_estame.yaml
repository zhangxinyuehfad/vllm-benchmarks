name: Update estimated test times

on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'main'
    paths:
      - '.github/workflows/schedule_update_estimated_time.yaml'

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: zhangxinyuehfad/vllm-benchmarks
  FORK_OWNER: Potabk

concurrency:
  group: update-estimated-times-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-estimated-times:
    name: Update estimated_time in config.yaml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork repo
        uses: actions/checkout@v6
        with:
          repository: Potabk/vllm-benchmarks
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          ref: test

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update config.yaml from timing data
        run: |
          echo "Collecting timing data artifacts...222" > timing_data.txt
          git status

      - name: Create pull request
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          BRANCH_NAME: auto/update-estimated-times-${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -sm "[CI] Auto-update estimated test times in config.yaml Computed from timing-data artifacts of workflow run"
          git checkout -b ${{ env.BRANCH_NAME }}
          git remote -v
          git log
          git push -f ${{ env.FORK_OWNER }} ${{ env.BRANCH_NAME }}:${{ env.BRANCH_NAME }}
          gh pr create \
            --repo ${{ env.UPSTREAM_REPO }} \
            --base main \
            --head ${{ env.FORK_OWNER }}:${{ env.BRANCH_NAME }} \
            --title "chore: Auto-update estimated test times in config.yaml" \
            --body "## Summary

          This PR was auto-generated by the **Update estimated test times** workflow.

          It updates the \`estimated_time\` values in \`.github/workflows/scripts/config.yaml\`
          based on actual elapsed times collected from workflow run.

          ### Methodology
          - Timing data is uploaded as \`timing-data-*\` artifacts by each e2e test job.
          - For each test file, the **median** of all collected elapsed times is taken.
          - A **10 % safety buffer** is applied and the result is rounded to the nearest 10 s.

          Please review the diff and merge if the new values look reasonable."
